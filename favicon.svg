<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="disk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2f74e0"/>
      <stop offset="1" stop-color="#0a3fae"/>
    </linearGradient>
  </defs>
  <!-- floppy body with notched top-right corner -->
  <path d="M4.5,3.5 H21 L28.5,11 V27 a1.5,1.5 0 0 1 -1.5,1.5 H6 a1.5,1.5 0 0 1 -1.5,-1.5 Z"
        fill="url(#disk)" stroke="#04205f" stroke-width="1.4" stroke-linejoin="round"/>
  <!-- metal shutter -->
  <rect x="9" y="3.8" width="10.5" height="8.4" fill="#cfd6dd" stroke="#5d6671" stroke-width="0.7"/>
  <rect x="15" y="5.4" width="3" height="5.2" fill="#828b96"/>
  <!-- label with a "T" -->
  <rect x="8" y="15" width="16" height="11.5" rx="0.6" fill="#ffffff" stroke="#5d6671" stroke-width="0.7"/>
  <text x="16" y="24.5" font-family="Tahoma, Verdana, sans-serif" font-size="9.5" font-weight="bold"
        fill="#0a3fae" text-anchor="middle">T</text>
</svg>
